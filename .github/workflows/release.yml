name: Release

on:
    workflow_dispatch:
        inputs:
            bump_type:
                description: 'Version bump type'
                required: true
                type: choice
                options:
                    - patch
                    - minor
                    - major

jobs:
    validate:
        name: Lint & Test
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Set up JDK 17
                uses: actions/setup-java@v4
                with:
                    java-version: '17'
                    distribution: 'temurin'

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v4

            -   name: Create google-services.json
                run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json

            -   name: Run Spotless Check
                run: ./gradlew spotlessCheck

            -   name: Run Detekt Analysis
                run: ./gradlew detekt

            -   name: Run Unit Tests
                run: ./gradlew test

    release:
        name: Build and Release
        needs: validate
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Set up JDK 17
                uses: actions/setup-java@v4
                with:
                    java-version: '17'
                    distribution: 'temurin'

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v4

            -   name: Create google-services.json
                run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json

            -   name: Get current version
                id: current_version
                run: |
                    VERSION_NAME=$(./gradlew -q :app:printVersionName)
                    echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT

            -   name: Calculate new version
                id: new_version
                run: |
                    CURRENT="${{ steps.current_version.outputs.version }}"
                    IFS='.' read -r major minor patch <<< "$CURRENT"
                    case "${{ inputs.bump_type }}" in
                        major) major=$((major + 1)); minor=0; patch=0 ;;
                        minor) minor=$((minor + 1)); patch=0 ;;
                        patch) patch=$((patch + 1)) ;;
                    esac
                    echo "version=$major.$minor.$patch" >> $GITHUB_OUTPUT

            -   name: Update version in build.gradle.kts
                run: |
                    sed -i 's/versionName = ".*"/versionName = "${{ steps.new_version.outputs.version }}"/' app/build.gradle.kts
                    CURRENT_CODE=$(grep -oP 'versionCode = \K\d+' app/build.gradle.kts)
                    NEW_CODE=$((CURRENT_CODE + 1))
                    sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts

            -   name: Decode Keystore
                run: |
                    mkdir -p signing
                    echo "${{ secrets.KEYSTORE }}" | base64 --decode > signing/keystore.jks

            -   name: Build Release APK & AAB
                env:
                    SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
                    SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
                    SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
                run: ./gradlew assembleRelease bundleRelease

            -   name: Verify build artifacts
                run: |
                    test -f app/build/outputs/apk/release/app-release.apk || { echo "APK not found"; exit 1; }
                    test -f app/build/outputs/bundle/release/app-release.aab || { echo "AAB not found"; exit 1; }

            -   name: Clean up secrets
                if: always()
                run: |
                    rm -f signing/keystore.jks
                    rm -f app/google-services.json

            -   name: Commit version bump
                run: |
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"
                    git add app/build.gradle.kts
                    git commit -m "chore: bump version to ${{ steps.new_version.outputs.version }}"
                    git push

            -   name: Create GitHub Release
                uses: softprops/action-gh-release@v2
                with:
                    tag_name: v${{ steps.new_version.outputs.version }}
                    name: Release v${{ steps.new_version.outputs.version }}
                    generate_release_notes: true
                    files: |
                        app/build/outputs/apk/release/app-release.apk
                        app/build/outputs/bundle/release/app-release.aab
